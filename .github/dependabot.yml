version: 2

updates:
  # Root workspace (devDependencies — TypeScript, ESLint, Prettier, Turborepo)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 10
    labels:
      - dependencies
    groups:
      typescript-tooling:
        patterns:
          - "typescript"
          - "@typescript-eslint/*"
          - "eslint*"
          - "prettier"
      turborepo:
        patterns:
          - "turbo"

  # apps/api — Fastify, Prisma, JWT, bcrypt, Zod
  - package-ecosystem: npm
    directory: /apps/api
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - api
    groups:
      fastify:
        patterns:
          - "fastify"
          - "@fastify/*"
      prisma:
        patterns:
          - "prisma"
          - "@prisma/*"

  # apps/web — Next.js, React, TanStack Query, Zustand, Heroicons
  - package-ecosystem: npm
    directory: /apps/web
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - web
    groups:
      next-react:
        patterns:
          - "next"
          - "react"
          - "react-dom"
          - "@types/react*"

  # packages/core — Zod
  - package-ecosystem: npm
    directory: /packages/core
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - packages

  # packages/api-client
  - package-ecosystem: npm
    directory: /packages/api-client
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - packages

  # packages/ui-components — Radix UI, CVA, Tailwind
  - package-ecosystem: npm
    directory: /packages/ui-components
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - packages
    groups:
      radix-ui:
        patterns:
          - "@radix-ui/*"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    labels:
      - dependencies
      - ci
