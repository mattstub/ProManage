name: Release

on:
  push:
    branches: [main]

# CI already ran on the PR — this workflow only builds and pushes Docker images.
# main is branch-protected, so every push here passed CI first.

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository_owner }}/promanage-api
  WEB_IMAGE: ghcr.io/${{ github.repository_owner }}/promanage-web

jobs:
  docker:
    name: Build & push Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata — API
        id: meta-api
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.API_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Docker metadata — web
        id: meta-web
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.WEB_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push API image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push web image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL || 'http://localhost:3001' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # -----------------------------------------------------------------------
      # Railway — trigger redeploys after images land in GHCR.
      # Set RAILWAY_WEBHOOK_API and RAILWAY_WEBHOOK_WEB in GitHub repo secrets.
      # Steps are skipped silently when secrets are not configured yet.
      # Webhook URLs: Railway dashboard → service → Settings → Deploy Hooks
      # -----------------------------------------------------------------------
      - name: Trigger Railway deploys
        if: success()
        env:
          RAILWAY_WEBHOOK_API: ${{ secrets.RAILWAY_WEBHOOK_API }}
          RAILWAY_WEBHOOK_WEB: ${{ secrets.RAILWAY_WEBHOOK_WEB }}
        run: |
          if [ -n "$RAILWAY_WEBHOOK_API" ]; then
            curl -s -f -X POST "$RAILWAY_WEBHOOK_API"
            echo "API deploy triggered"
          else
            echo "RAILWAY_WEBHOOK_API not set — skipping API deploy"
          fi
          if [ -n "$RAILWAY_WEBHOOK_WEB" ]; then
            curl -s -f -X POST "$RAILWAY_WEBHOOK_WEB"
            echo "Web deploy triggered"
          else
            echo "RAILWAY_WEBHOOK_WEB not set — skipping web deploy"
          fi
